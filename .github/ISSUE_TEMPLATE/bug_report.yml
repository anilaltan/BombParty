name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to file a bug report."

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create a room
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "e.g. Chrome 124 on Windows 11"

  - type: textarea
    id: logs
    attributes:
      label: Console errors (if any)
      render: shell
